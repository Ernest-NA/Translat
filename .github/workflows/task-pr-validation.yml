name: Task PR validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - develop

jobs:
  validate-task-pr:
    if: ${{ github.base_ref == 'develop' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate task branch naming
        run: |
          BRANCH='${{ github.head_ref }}'
          if [[ ! "$BRANCH" =~ ^task/[A-Z][0-9]+[a-zA-Z0-9-]* ]]; then
            echo "Invalid task branch name: $BRANCH"
            echo "Expected format: task/{NOTION_TASK_ID}-{slug}"
            exit 1
          fi

      - name: Validate PR title contains task id
        run: |
          TITLE='${{ github.event.pull_request.title }}'
          if [[ ! "$TITLE" =~ ^\[[A-Z][0-9]+\] ]]; then
            echo "Invalid PR title: $TITLE"
            echo "Expected prefix: [A1], [B4], [E6], etc."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scaffold validation
        run: |
          npm install
          npm run check:scaffold

      - name: Write summary
        run: |
          {
            echo "## Task PR validation"
            echo "- Head branch: ${{ github.head_ref }}"
            echo "- Base branch: ${{ github.base_ref }}"
            echo "- PR title: ${{ github.event.pull_request.title }}"
            echo "- Validation: OK"
          } >> "$GITHUB_STEP_SUMMARY"
