name: Frontend Biome validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - develop
      - main

concurrency:
  group: biome-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  biome-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Biome frontend checks
        run: npm run lint
