name: Rust Clippy validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - develop
      - main

jobs:
  rust-clippy:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Detect Cargo manifest
        id: detect-manifest
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "manifest=Cargo.toml" >> "$GITHUB_OUTPUT"
          elif [ -f src-tauri/Cargo.toml ]; then
            echo "manifest=src-tauri/Cargo.toml" >> "$GITHUB_OUTPUT"
          elif [ -f src/backend/Cargo.toml ]; then
            echo "manifest=src/backend/Cargo.toml" >> "$GITHUB_OUTPUT"
          else
            echo "manifest=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain with Clippy
        if: ${{ steps.detect-manifest.outputs.manifest != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run cargo clippy
        if: ${{ steps.detect-manifest.outputs.manifest != '' }}
        shell: bash
        run: |
          MANIFEST='${{ steps.detect-manifest.outputs.manifest }}'
          cargo clippy --manifest-path "$MANIFEST" --all-targets --all-features -- -D warnings

      - name: Write summary for scaffold stage
        if: ${{ steps.detect-manifest.outputs.manifest == '' }}
        run: |
          {
            echo "## Rust Clippy validation"
            echo "- Status: skipped"
            echo "- Reason: no Cargo manifest found yet in scaffold stage"
            echo "- Expected future locations: Cargo.toml, src-tauri/Cargo.toml, or src/backend/Cargo.toml"
          } >> "$GITHUB_STEP_SUMMARY"
